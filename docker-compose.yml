# Infra de desenvolvimento do Nxt.
# Sobe apenas o SQL Server (banco ÚNICO de toda a stack). A autenticação é própria
# da aplicação (usuários no banco, JWT assinado pela API) — NÃO há mais Keycloak
# nem Postgres.
#
#   docker compose up -d
#   Banco da app: sqlserver://localhost:1433 (sa / Nxt_Dev_2026!), database `nxt`
#
# Após subir: rode o seed (packages/database: `npm run db:push && npm run db:seed`)
# para criar a org demo e o usuário admin.

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nxt-sqlserver
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: Nxt_Dev_2026!
      MSSQL_PID: Developer
    ports:
      - '1433:1433'
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ['CMD-SHELL', '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$MSSQL_SA_PASSWORD" -C -Q "SELECT 1" || exit 1']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Cria o database `nxt` (app) assim que o SQL Server fica saudável. Roda uma vez.
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: nxt-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: Nxt_Dev_2026!
    entrypoint:
      - /bin/bash
      - -c
      - >
        /opt/mssql-tools18/bin/sqlcmd -S sqlserver -U sa -P "$$MSSQL_SA_PASSWORD" -C
        -Q "IF DB_ID('nxt') IS NULL CREATE DATABASE nxt;"
    restart: 'no'

volumes:
  sqlserver-data:
